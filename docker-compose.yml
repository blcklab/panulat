services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: panulat_app
    working_dir: /app
    ports:
      - "${APP_PORT:-8080}:8080"
    volumes:
      - ./:/app
      - vendor:/app/vendor
    env_file:
      - path: .env
        required: false
    environment:
      COMPOSER_ALLOW_SUPERUSER: "1"

      APP_NAME: ${APP_NAME:-Panulat API}
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_URL: ${APP_URL:-http://127.0.0.1:8080}

      DB_CONNECTION: ${DB_CONNECTION:-mysql}
      DB_HOST: ${DB_HOST:-mysql}
      DB_PORT: ${DB_PORT:-3306}
      DB_DATABASE: ${DB_DATABASE:-panulat}
      DB_USERNAME: ${DB_USERNAME:-panulat}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      DB_CHARSET: ${DB_CHARSET:-utf8mb4}

      CACHE_DRIVER: ${CACHE_DRIVER:-file}
      LOG_CHANNEL: ${LOG_CHANNEL:-stderr}
      LOG_REQUESTS: ${LOG_REQUESTS:-true}

      JWT_SECRET: ${JWT_SECRET:-local-panulat-secret-change-me-32-chars}
      JWT_TTL: ${JWT_TTL:-3600}
      API_KEYS: ${API_KEYS:-local-dev-key}

      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
      RATE_LIMIT_API_MAX_ATTEMPTS: ${RATE_LIMIT_API_MAX_ATTEMPTS:-60}
      RATE_LIMIT_API_DECAY_SECONDS: ${RATE_LIMIT_API_DECAY_SECONDS:-60}
      RATE_LIMIT_LOGIN_MAX_ATTEMPTS: ${RATE_LIMIT_LOGIN_MAX_ATTEMPTS:-5}
      RATE_LIMIT_LOGIN_DECAY_SECONDS: ${RATE_LIMIT_LOGIN_DECAY_SECONDS:-60}

      PANULAT_AUTO_MIGRATE: ${PANULAT_AUTO_MIGRATE:-true}
      PANULAT_AUTO_SEED: ${PANULAT_AUTO_SEED:-true}
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  mysql:
    image: mysql:8.4
    container_name: panulat_mysql
    ports:
      - "${DB_FORWARD_PORT:-3309}:3306"
    env_file:
      - path: .env
        required: false
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-panulat}
      MYSQL_USER: ${DB_USERNAME:-panulat}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_ROOT_PASSWORD:-root}"]
      interval: 5s
      timeout: 5s
      retries: 30
    restart: unless-stopped

volumes:
  mysql_data:
  vendor: